name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy frontend na VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /var/www/projetos/termo-app
            git remote set-url origin git@github.com:termosinterdev/termo-app.git
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            npm install
            npm run build
            rm -rf /var/www/html/*
            cp -r dist/* /var/www/html/
            systemctl restart nginx
